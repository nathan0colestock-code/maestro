<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#0a0a0a" />
    <title>Maestro — Offline</title>
    <style>
      html, body {
        margin: 0;
        height: 100%;
        background: #0a0a0a;
        color: #f5f5f5;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      }
      .wrap {
        height: 100%;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        padding: 24px;
        text-align: center;
      }
      h1 { font-size: 24px; margin: 0 0 12px; font-weight: 600; }
      p  { margin: 0 0 8px; opacity: 0.75; line-height: 1.45; }
      button {
        margin-top: 24px;
        padding: 12px 24px;
        background: #f5f5f5;
        color: #0a0a0a;
        border: 0;
        border-radius: 10px;
        font-size: 16px;
        font-weight: 600;
      }
    </style>
  </head>
  <body>
    <div class="wrap">
      <h1>You're offline</h1>
      <p>Captures you submit from the home screen will be queued and sent automatically once you're back online.</p>
      <p>The dashboard needs a connection — try again when you're back.</p>
      <button onclick="location.reload()">Retry</button>
    </div>
  </body>
</html>
